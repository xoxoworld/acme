<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>acme</title>
</head>
<link rel="stylesheet" href="common.css">
<body>

    <header>
        <nav aria-label="메인 네비게이션">
            <ul>
                <li><a href="#" class="nav-item">메뉴 아이템 1</a></li>
                <li><a href="#" class="nav-item">메뉴 아이템 2</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article>
            <h1 class="heading-xl">메인 페이지 대제목 (Heading XL)</h1>

            <p class="body-l">
                도입부나 강조가 필요한 큰 본문 텍스트입니다. 웹사이트의 주요 메시지를 전달할 때 사용하기 적합합니다. (Body L)
            </p>

            <section>
                <h2 class="heading-s">섹션 소제목 (Heading S)</h2>

                <p class="body-m-plus">
                    기본 텍스트보다 약간 큰 본문입니다. 가독성을 높여야 하는 문단에 적용할 수 있습니다. (Body M+)
                </p>

                <p class="body-m">
                    가장 기본이 되는 일반 본문 텍스트입니다. 페이지 내의 대부분의 설명이나 단락에 사용됩니다. (Body M)
                </p>

                <a href="#" class="text-link">더 알아보기 (Link)</a>
            </section>
        </article>
    </main>

</body>
</html>
